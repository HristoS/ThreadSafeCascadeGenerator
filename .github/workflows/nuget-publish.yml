name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.1.2, etc.

# Forces all JavaScript actions in this workflow to execute on Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for OpenID Connect (OIDC) Trusted Publishing
permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Run xUnit Tests
      run: dotnet test --configuration Release --no-restore

    - name: Pack Library to NuGet Structure
      run: dotnet pack src/ThreadSafeCascadeGenerator.csproj --configuration Release --output ./nupkg

      # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: contoso-bot # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address

    - name: Push Package to NuGet.org
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --interactive false