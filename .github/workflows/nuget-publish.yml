name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.1.2, etc.

# Required for OpenID Connect (OIDC) Trusted Publishing
permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Run xUnit Tests
      run: dotnet test --configuration Release --no-restore

    - name: Pack Library to NuGet Structure
      run: dotnet pack src/ThreadSafeCascadeGenerator.csproj --configuration Release --output ./nupkg

    - name: Push Package to NuGet.org
      # Explicitly use the modern index URL and disable interactivity so OIDC triggers smoothly
      run: dotnet nuget push ./nupkg/*.nupkg --source https://nuget.org --interactive false